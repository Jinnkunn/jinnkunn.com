name: Release on dispatch (db mode)

# Triggered by the site-admin Deploy button when SITE_ADMIN_STORAGE=db.
# Builds + uploads + deploys the Cloudflare Worker so the worker bundle
# picks up the latest D1 content (prebuild dumps from D1 into content/*
# at the start of the build).
#
# Github mode keeps using deploy-on-content.yml (push-triggered overlay
# build); the two workflows do not overlap.
#
# Trigger from CF Worker:
#   POST https://api.github.com/repos/<owner>/<repo>/dispatches
#   { event_type: "release-staging" }   or "release-production"
#
# Required GitHub Repo Secrets:
#   CLOUDFLARE_API_TOKEN
#   CLOUDFLARE_ACCOUNT_ID
#   SITE_ADMIN_GH_APP_ID               (re-mapped to GITHUB_APP_ID in env;
#                                       GitHub forbids secret names starting
#                                       with GITHUB_)
#   SITE_ADMIN_GH_APP_INSTALLATION_ID  (-> GITHUB_APP_INSTALLATION_ID)
#   SITE_ADMIN_GH_APP_PRIVATE_KEY      (-> GITHUB_APP_PRIVATE_KEY; multi-line
#                                       PEM is fine, GitHub Secrets keeps the
#                                       newlines verbatim)
#   NEXTAUTH_SECRET                    (signs the desktop app token)
#   FLAGS_SECRET                       (Vercel Flags SDK)
#   DEPLOY_TOKEN                       (admin -> deploy hook signer)
#   DEPLOY_HOOK_URL                    (optional, see DEPLOY_PROVIDER below)
# Optional:
#   CLOUDFLARE_WORKER_NAME_STAGING / CLOUDFLARE_WORKER_NAME_PRODUCTION
#   SITE_ADMIN_GITHUB_USERS            (auth allowlist; only needed if any
#                                       GET-protected route is hit during
#                                       the verify step)

on:
  repository_dispatch:
    types:
      - release-staging
      - release-production
  # Manual fallback — same behavior, env picked from the workflow input.
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment (staging or production)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  # deployments:write lets us create a GitHub Deployment row for this
  # release so the GitHub UI shows the in-progress / success / failure
  # state under the repo's Environments tab. No external service needed
  # for "did the last release succeed?" — the answer lives where the
  # workflow already lives.
  deployments: write

concurrency:
  group: release-dispatch-${{ github.event.action || inputs.env }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # repository_dispatch types map directly to env names; workflow_dispatch
      # provides it via input. Default to staging if neither is set so the
      # workflow can never silently target production.
      #
      # IMPORTANT: must NOT use the `|` block scalar — it appends a trailing
      # newline that makes shell `[ "$TARGET_ENV" = "staging" ]` evaluate
      # false and fall through to the production branch. Single-line plain
      # scalar is the only safe form here.
      TARGET_ENV: ${{ (github.event_name == 'repository_dispatch' && (github.event.action == 'release-production' && 'production' || 'staging')) || inputs.env || 'staging' }}
      SITE_ADMIN_STORAGE: db
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_WORKER_NAME_STAGING: ${{ secrets.CLOUDFLARE_WORKER_NAME_STAGING }}
      CLOUDFLARE_WORKER_NAME_PRODUCTION: ${{ secrets.CLOUDFLARE_WORKER_NAME_PRODUCTION }}
      # Remapped from SITE_ADMIN_GH_APP_* — GitHub rejects secret names
      # that start with GITHUB_, but the build / runtime read these env
      # vars under the unprefixed names so we rebind them here.
      GITHUB_APP_ID: ${{ secrets.SITE_ADMIN_GH_APP_ID }}
      GITHUB_APP_INSTALLATION_ID: ${{ secrets.SITE_ADMIN_GH_APP_INSTALLATION_ID }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.SITE_ADMIN_GH_APP_PRIVATE_KEY }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      FLAGS_SECRET: ${{ secrets.FLAGS_SECRET }}
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
      SITE_ADMIN_GITHUB_USERS: ${{ secrets.SITE_ADMIN_GITHUB_USERS }}
    steps:
      - name: Guard — required secrets present
        run: |
          missing=""
          for k in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID GITHUB_APP_ID GITHUB_APP_INSTALLATION_ID GITHUB_APP_PRIVATE_KEY NEXTAUTH_SECRET; do
            v="$(eval echo \$$k)"
            if [ -z "$v" ]; then missing="$missing $k"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Guard — staging matches main before production releases
        # Defense-in-depth: the workspace's "Promote to Production" button
        # already refuses to dispatch unless staging's deployed code SHA
        # matches main HEAD. But this workflow is also reachable via
        # `gh workflow run release-from-dispatch.yml -f env=production`,
        # which bypasses that check. Re-run the same comparison here so
        # an out-of-band trigger can't ship a code SHA that staging
        # hasn't validated. (Uses jq instead of a multiline Python
        # heredoc — column-0 lines inside `run: |` terminate YAML's
        # literal block scalar and silently strip workflow triggers.)
        if: env.TARGET_ENV == 'production'
        run: |
          set -euo pipefail
          worker="${CLOUDFLARE_WORKER_NAME_STAGING:-jinnkunn-site-staging}"
          base="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$worker"
          version_id=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$base/deployments" \
            | jq -er '.result.deployments[0].versions | sort_by(-(.percentage // 0))[0].version_id')
          version_msg=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$base/versions/$version_id" \
            | jq -r '.result.annotations["workers/message"] // .result.message // ""')
          staging_sha=$(printf %s "$version_msg" | grep -oiE '(code|source)=[a-f0-9]{7,40}' | head -1 | cut -d= -f2 | tr 'A-Z' 'a-z')
          if [ -z "$staging_sha" ]; then
            echo "::error::staging deployment annotation has no code/source SHA: $version_msg"
            exit 1
          fi
          main_sha=$(printf %s "$GITHUB_SHA" | tr 'A-Z' 'a-z')
          if [ "$staging_sha" != "$main_sha" ]; then
            echo "::error::staging is on $staging_sha but main is on $main_sha; release:staging first"
            exit 1
          fi
          echo "[guard] staging $staging_sha matches main $main_sha"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Open GitHub Deployment record
        # Each release leaves an audit trail under the repo's Environments
        # tab. Subsequent steps either flip this to "success" (after the
        # smoke check) or "failure" (on any error) so the UI never claims
        # success for a deploy that the smoke missed.
        id: gh_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const env = process.env.TARGET_ENV;
            const url = env === "production"
              ? "https://jinkunchen.com"
              : "https://staging.jinkunchen.com";
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: env,
              auto_merge: false,
              required_contexts: [],
              description: `release-from-dispatch (${context.payload.action || context.payload.inputs?.env || "manual"})`,
              transient_environment: env === "staging",
              production_environment: env === "production",
            });
            const id = deployment.data.id;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: id,
              state: "in_progress",
              environment_url: url,
              description: "build → upload → deploy → verify in flight",
            });
            core.setOutput("id", id);
            core.setOutput("environment_url", url);

      - name: Release (${{ env.TARGET_ENV }}) via db-mode build
        env:
          # Tells prebuild's dump-content-from-db.mjs which D1 to pull from.
          SITE_ADMIN_DB_ENV: ${{ env.TARGET_ENV }}
        run: |
          export CLOUDFLARE_WORKER_NAME_STAGING="${CLOUDFLARE_WORKER_NAME_STAGING:-jinnkunn-site-staging}"
          export CLOUDFLARE_WORKER_NAME_PRODUCTION="${CLOUDFLARE_WORKER_NAME_PRODUCTION:-jinnkunn-site}"

          if [ "$TARGET_ENV" = "staging" ]; then
            # Run the cheap static checks first so a raw color literal or
            # a stale design-system token fails fast (well before we burn
            # ~5 min on a Cloudflare deploy). production-style-regression
            # is intentionally absent — it spins up `npm run start` and a
            # Playwright comparison against jinkunchen.com, which needs a
            # warm `.next/` directory the local CLI has but a fresh CI
            # checkout does not. The local release path still runs it.
            npm run check:classic-css
            npm run check:design-system
            npm run check:classic-style
            npm run lint
            npm run test
            npm run check:scripts
            # `release:staging --skip-checks` leaves the release-cloudflare
            # script's CHECKS array off; we already ran the cheap subset
            # ourselves above.
            npm run release:staging -- --skip-checks
          else
            # Production guardrails (CONFIRM_PRODUCTION_DEPLOY etc) are
            # enforced inside release-cloudflare.mjs; we set CONFIRM_* here
            # because dispatch implies operator intent. Production keeps
            # --skip-checks because production-style-regression compares
            # the candidate against jinkunchen.com itself — comparing a
            # deploying-to-prod build against the prod we're about to
            # replace is a self-referential trap. The staging dispatch
            # above already exercised the same checks against the same
            # code SHA, so the safety net is in place upstream.
            export CONFIRM_PRODUCTION_DEPLOY=1
            export CONFIRM_PRODUCTION_SHA="$GITHUB_SHA"
            npm run release:prod -- --skip-checks
          fi

      - name: Smoke deployed routes
        # Walks 7 real routes (/, /blog, /publications, /calendar plus
        # the static /robots.txt /llms.txt /sitemap.xml) and asserts a
        # known marker per page. Replaces the previous /robots.txt-only
        # ping that would happily green-light a worker that booted but
        # 5xx'd every actual route.
        run: node scripts/smoke-deployed.mjs --env=$TARGET_ENV

      - name: Mark GitHub Deployment status
        # Always runs so a failed release flips the Deployment row to
        # "failure" instead of leaving it stuck on "in_progress". Reads
        # the prior steps' outcomes from the job context.
        if: always() && steps.gh_deployment.outputs.id
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.gh_deployment.outputs.id }}
          DEPLOYMENT_URL: ${{ steps.gh_deployment.outputs.environment_url }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const status = process.env.JOB_STATUS;
            const id = Number(process.env.DEPLOYMENT_ID);
            const url = process.env.DEPLOYMENT_URL;
            const state = status === "success" ? "success" : "failure";
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: id,
              state,
              environment_url: url,
              log_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              description: state === "success"
                ? "deploy + smoke ok"
                : `release failed (${status})`,
            });
