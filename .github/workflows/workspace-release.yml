# Workspace (Tauri desktop app) release pipeline.
#
# Active. Fires on a v-prefixed tag (`git tag v0.1.1 && git push origin
# v0.1.1`) or via manual dispatch in the Actions UI. Each run builds a
# signed, updater-compatible .dmg for macOS and uploads it as a draft
# GitHub Release along with `latest.json` (the updater manifest that
# `tauri-plugin-updater` reads from the endpoint configured in
# apps/workspace/src-tauri/tauri.conf.json).
#
# Required repo secrets (set via `gh secret set`):
#   TAURI_SIGNING_PRIVATE_KEY           contents of the ~/.tauri/*.key file
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  "" if the key has no password
#   GITHUB_TOKEN                        auto-provided, no action needed
#
# To rotate the key: regenerate with `tauri signer generate`, update the
# two secrets above, and replace `plugins.updater.pubkey` in
# tauri.conf.json. Already-installed app builds signed by the old key
# will stop accepting updates until a fresh install.

name: Workspace Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# tauri-action creates / updates a GitHub Release and uploads .dmg +
# latest.json to it. That requires `contents: write` on the runtime
# GITHUB_TOKEN — the repo-default is `contents: read`, which lets the
# Rust build succeed but fails the release-creation step.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Cross-build matrix. macOS only by default since this is a
        # personal admin tool running on the author's MacBook. Add
        # windows-latest / ubuntu-22.04 if you want cross-platform
        # builds — `tauri-action` handles each.
        platform:
          - macos-latest
        # - windows-latest
        # - ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/workspace/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/workspace/src-tauri

      - name: Install frontend deps
        working-directory: apps/workspace
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build + publish with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/workspace
          tagName: v__VERSION__
          releaseName: "Workspace v__VERSION__"
          releaseDraft: true
          prerelease: false
          # tauri-action auto-generates `latest.json` (the updater
          # manifest) and attaches it to the release, which matches the
          # endpoint configured in tauri.conf.json.
          updaterJsonPreferNsis: false
