<!--
  macOS menubar tray icon. The original brand mark (~91x96, near-square)
  is centered inside a 120x120 canvas so the artwork lands at ~80% of
  the slot — Apple's HIG convention for menubar glyphs (~16-18pt
  artwork in a 22pt cell).

  Fill is black; the menubar will template-tint it on macOS via
  `icon_as_template(true)` in main.rs, so the glyph adapts to light /
  dark mode automatically. The PNG sibling (tray.png) is rendered from
  this file at 44x44 (2x retina) — re-render via
  `node apps/workspace/scripts/build-tray-icon.mjs` after edits.
-->
